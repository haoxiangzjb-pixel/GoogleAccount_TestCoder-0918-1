syntax = "proto3";

package profile;

// Service definition for profile operations
service ProfileService {
  // Get a user profile by ID
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}

// Request message for getting a profile
message GetProfileRequest {
  string user_id = 1;
}

// Response message containing the profile
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string message = 3;
}

// Profile message definition
message Profile {
  string id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
  string bio = 5;
  repeated string interests = 6;
  string avatar_url = 7;
  string created_at = 8;
  string updated_at = 9;
}