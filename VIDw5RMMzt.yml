---
# Ansible playbook to restart a service
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: Verify service status

    - name: Wait for service to become available
      wait_for:
        port: "{{ service_port | default(80) }}"
        delay: 5
        timeout: 30
      when: service_port is defined

  handlers:
    - name: Verify service status
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: started