---
- name: Copy file with random name
  hosts: localhost
  tasks:
    - name: Generate random string
      set_fact:
        random_string: "{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=10') }}"

    - name: Copy file with random name
      copy:
        src: /etc/hosts
        dest: "/tmp/hosts_{{ random_string }}"
        mode: '0644'