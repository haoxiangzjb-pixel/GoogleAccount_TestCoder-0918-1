syntax = "proto3";

package status;

// StatusCode 表示系统状态码的枚举定义
enum StatusCode {
  STATUS_CODE_UNSPECIFIED = 0;  // 未指定的状态码
  
  // 成功状态
  STATUS_OK = 1;                 // 操作成功
  STATUS_CREATED = 2;            // 资源已创建
  STATUS_ACCEPTED = 3;           // 请求已接受
  
  // 客户端错误状态
  STATUS_BAD_REQUEST = 400;      // 错误的请求
  STATUS_UNAUTHORIZED = 401;     // 未授权
  STATUS_FORBIDDEN = 403;        // 禁止访问
  STATUS_NOT_FOUND = 404;        // 资源未找到
  STATUS_CONFLICT = 409;         // 冲突
  
  // 服务端错误状态
  STATUS_INTERNAL_ERROR = 500;   // 服务器内部错误
  STATUS_NOT_IMPLEMENTED = 501;  // 功能未实现
  STATUS_SERVICE_UNAVAILABLE = 503; // 服务不可用
}
