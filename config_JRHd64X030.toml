# Конфигурационный файл приложения

[server]
host = "0.0.0.0"
port = 8080
debug = false

[database]
host = "localhost"
port = 5432
name = "myapp_db"
user = "db_user"
password = "secure_password"
ssl_mode = "require"

[cache]
provider = "redis"
host = "localhost"
port = 6379
ttl = 3600

[logging]
level = "info"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = "/var/log/myapp/app.log"

[features]
enable_beta = true
max_connections = 100
rate_limit = 1000