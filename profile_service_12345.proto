syntax = "proto3";

package profile_api;

// Сообщение, представляющее профиль пользователя
message Profile {
  string user_id = 1;
  string name = 2;
  string email = 3;
}

// Запрос на получение профиля
message GetProfileRequest {
  string user_id = 1;
}

// Ответ на запрос получения профиля
message GetProfileResponse {
  Profile profile = 1;
}

// Определение сервиса
service ProfileService {
  // Метод для получения профиля по ID пользователя
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}