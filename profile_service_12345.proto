syntax = "proto3";

package user;

// Service for retrieving user profiles
service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}

// Request message for getting a user profile
message GetProfileRequest {
  string user_id = 1;
}

// Response message containing the user profile
message GetProfileResponse {
  User user = 1;
}

// Message representing a user profile
message User {
  string user_id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
}