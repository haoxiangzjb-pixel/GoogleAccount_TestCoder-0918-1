---
# Ansible task to copy a file with a random name
- name: Copy file with random name
  hosts: localhost
  tasks:
    - name: Generate random filename
      set_fact:
        random_filename: "{{ '/tmp/copied_file_' + (1000000 | random | string) + '.txt' }}"

    - name: Copy file with random name
      copy:
        src: /workspace/first.txt
        dest: "{{ random_filename }}"
        mode: '0644'
      register: copy_result

    - name: Display the new filename
      debug:
        msg: "File copied to {{ random_filename }}"