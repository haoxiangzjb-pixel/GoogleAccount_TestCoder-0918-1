---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('httpd') }}"
        state: restarted
      notify: Check service status

    - name: Wait for service to be running
      wait_for:
        path: /var/run/{{ service_name | default('httpd') }}.pid
        state: present
        timeout: 30
      when: service_name is defined

  handlers:
    - name: Check service status
      systemd:
        name: "{{ service_name | default('httpd') }}"
        state: status