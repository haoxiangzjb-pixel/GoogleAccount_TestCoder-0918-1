---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart service
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: 
        - wait for service to be running

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

  handlers:
    - name: wait for service to be running
      wait_for:
        path: /var/run/{{ service_name | default('nginx') }}.pid
        state: present
        timeout: 30