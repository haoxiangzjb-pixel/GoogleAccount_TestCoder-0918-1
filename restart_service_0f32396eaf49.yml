---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart service
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: 
        - wait for service to restart

  handlers:
    - name: wait for service to restart
      wait_for:
        port: "{{ service_port | default(80) }}"
        delay: 5
        timeout: 30