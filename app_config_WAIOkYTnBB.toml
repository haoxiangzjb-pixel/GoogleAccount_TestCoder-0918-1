# App Configuration Settings

[app]
name = "MyAwesomeApp"
version = "1.0.0"
debug = false

[server]
host = "localhost"
port = 8080
ssl_enabled = true

[database]
host = "db.example.com"
port = 5432
name = "myapp_db"
username = "db_user"
password = "secure_password"

[features]
enable_logging = true
max_connections = 100
rate_limit = 1000