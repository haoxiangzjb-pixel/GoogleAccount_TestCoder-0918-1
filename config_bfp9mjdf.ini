[database]
host = localhost
port = 5432
name = myapp_db
user = db_user
password = secure_password
connection_timeout = 30
ssl_mode = require

[connection_pool]
max_connections = 20
min_connections = 5
connection_lifetime = 1800

[backup]
enabled = true
backup_path = /var/backups/database
retention_days = 30