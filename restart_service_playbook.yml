---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart service
      systemd:
        name: "{{ service_name | default('httpd') }}"
        state: restarted
      notify: wait for service

    - name: Ensure service is running
      systemd:
        name: "{{ service_name | default('httpd') }}"
        state: started

  handlers:
    - name: wait for service
      wait_for:
        port: "{{ service_port | default(80) }}"
        delay: 2
        timeout: 30