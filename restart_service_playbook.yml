---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('nginx') }}"
        state: restarted
      notify: Reload firewall

    - name: Ensure the service is enabled
      systemd:
        name: "{{ service_name | default('nginx') }}"
        enabled: yes

  handlers:
    - name: Reload firewall
      command: firewall-cmd --reload