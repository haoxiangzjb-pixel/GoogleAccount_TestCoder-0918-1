# Application Configuration
title = "My Application Configuration"

[database]
host = "localhost"
port = 5432
username = "app_user"
password = "secure_password"
database_name = "myapp_db"

[server]
host = "0.0.0.0"
port = 8080
environment = "development"

[logging]
level = "info"
format = "json"
output = "stdout"

[features]
enable_cache = true
max_connections = 100
timeout_seconds = 30

[api]
version = "v1"
rate_limit = 1000