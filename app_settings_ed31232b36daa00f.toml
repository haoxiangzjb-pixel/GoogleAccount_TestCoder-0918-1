# Application Configuration
title = "My Application Settings"

[app]
name = "Sample App"
version = "1.0.0"
debug = true
environment = "development"

[database]
host = "localhost"
port = 5432
name = "myapp_db"
username = "db_user"
password = "db_password"
ssl_enabled = false

[server]
host = "0.0.0.0"
port = 8080
timeout = 30
max_connections = 100

[logging]
level = "info"
format = "json"
output = "stdout"

[features]
enable_cache = true
enable_auth = true
enable_api = true
api_rate_limit = 1000