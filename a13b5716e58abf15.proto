syntax = "proto3";

package profile;

// Определение сообщения для профиля пользователя
message Profile {
  string id = 1;
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  int32 age = 6;
  string avatar_url = 7;
  string bio = 8;
  repeated string interests = 9;
}

// Запрос на получение профиля
message GetProfileRequest {
  string profile_id = 1;
}

// Ответ с профилем
message GetProfileResponse {
  Profile profile = 1;
  bool success = 2;
  string error_message = 3;
}

// Сервис для работы с профилями
service ProfileService {
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
  rpc GetMyProfile (GetProfileRequest) returns (GetProfileResponse);
}