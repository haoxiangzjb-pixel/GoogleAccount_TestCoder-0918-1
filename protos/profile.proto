syntax = "proto3";

package profile;

// Service for retrieving user profiles
service ProfileService {
  // Get a user profile by user ID
  rpc GetProfile (GetProfileRequest) returns (GetProfileResponse);
}

// Request message for GetProfile
message GetProfileRequest {
  string user_id = 1;
}

// Response message for GetProfile
message GetProfileResponse {
  Profile profile = 1;
}

// Profile message definition
message Profile {
  string id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
  string bio = 5;
}