---
- name: Restart a service
  hosts: localhost
  become: yes
  tasks:
    - name: Restart the specified service
      systemd:
        name: "{{ service_name | default('httpd') }}"
        state: restarted
      notify: verify service status

    - name: Flush handlers
      meta: flush_handlers

  handlers:
    - name: verify service status
      debug:
        msg: "Service {{ service_name | default('httpd') }} has been restarted and is running."